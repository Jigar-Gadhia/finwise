name: Generate Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag (example: v1.2.0 or v1.2.0-beta)"
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ✅ Node Setup
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Enable Yarn (Corepack)
      - name: 🧶 Enable Yarn
        run: corepack enable

      # ✅ Cache Yarn + node_modules 🔥
      - name: 📦 Cache Yarn Dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      # ✅ Java Setup
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Android SDK Setup
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Cache Gradle 🔥🔥🔥
      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ✅ Install Dependencies (Deterministic)
      - name: 📦 Install Dependencies
        run: yarn install --frozen-lockfile

      # ✅ Decode Keystore
      - name: 🔐 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/finwise-release.keystore

      # ✅ Gradle Permission
      - name: 🔧 Grant Gradle Permission
        run: chmod +x android/gradlew

      # ✅ Build Release APK 🚀🔥
      - name: 🚀 Build Release APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease \
            -PKEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      # ✅ Rename APK with Version Name
      - name: 📦 Rename APK
        run: |
          APK_PATH=android/app/build/outputs/apk/release/app-release.apk
          NEW_NAME=android/app/build/outputs/apk/release/finwise-${{ github.ref_name }}.apk

          mv $APK_PATH $NEW_NAME

      # ✅ Create GitHub Release
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 🚀 FinWise ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: android/app/build/outputs/apk/release/finwise-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
